<!DOCTYPE html>

<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

```
<div class="container">

    <div class="left">

        <h1>Бюро кредитной истории</h1>

        <p>
            Получайте информацию о кредитном рейтинге,
            финансовой активности и истории обязательств
            в защищённом личном кабинете.
        </p>

        <div class="stats">

            <div class="stat">
                <h3>24/7</h3>
                <p>Доступ к данным</p>
            </div>

            <div class="stat">
                <h3>100%</h3>
                <p>Защита информации</p>
            </div>

            <div class="stat">
                <h3>5000+</h3>
                <p>Пользователей</p>
            </div>

        </div>

    </div>

    <div class="right">

        <div class="card">

            <div class="logo">

                <img src="/logo.png" alt="Логотип" class="logo-img">

                <h3>Credit Portal</h3>

            </div>

            <h2>Авторизация</h2>

            <p class="subtitle">
                Введите данные для входа
            </p>

            <form action="profile.html">

                <div class="input-group">
                    <input
                        type="email"
                        name="email"
                        placeholder="Электронная почта"
                        required>
                </div>

                <div class="input-group">
                    <input
                        type="password"
                        name="password"
                        placeholder="Пароль"
                        required>
                </div>

                <button class="btn" type="submit">
                    Войти
                </button>

            </form>

            <a class="link" href="register.html">
                Зарегистрироваться
            </a>

        </div>

    </div>

</div>
```

</body>

</html>
