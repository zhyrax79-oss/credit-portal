<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f8ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1663ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
text-align:center;
}
</style>

</head>
<body>

<div class="card">
<h2>Регистрация</h2>

<form action="/register" method="POST">
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Пароль" required>
<button type="submit">Создать аккаунт</button>
</form>

<a href="/login.html">Уже есть аккаунт?</a>

</div>

</body>
</html>
